<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohit Sonawane | Portfolio</title>
  
  <!-- Fonts & Icons -->
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="https://cloudflare.com">

  <style>
    /* ==========================================
       RESET & BASE STYLES
       ========================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ==========================================
       ANIMATED BACKGROUND
       ========================================== */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 10%, transparent 11%);
      background-size: 60px 60px;
      animation: moveBg 30s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes moveBg {
      from { transform: translate(0, 0); }
      to { transform: translate(-300px, -300px); }
    }

    /* ==========================================
       NAVIGATION & HEADER
       ========================================== */
    header {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)),
                  url('https://unsplash.com') no-repeat center center/cover;
    }

    .hero-content {
      max-width: 800px;
      z-index: 2;
    }

    header h1 {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ffffff, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    header p {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      color: #cbd5e1;
      min-height: 2.5rem;
    }

    nav {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: #f8fafc;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 500;
      transition: all 0.3s ease;
    }

    nav a:hover {
      background: #38bdf8;
      color: #0f172a;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
    }

    /* ==========================================
       LAYOUT CONTAINER & CARDS
       ========================================== */
    section {
      padding: 6rem 2rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #38bdf8;
      font-size: 2.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 40px;
      height: 3px;
      background: #38bdf8;
      border-radius: 2px;
    }

    /* ==========================================
       SECTION SPECIFIC STYLES
       ========================================== */
    .about-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #cbd5e1;
    }

    /* Skills Grid */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1.25rem;
    }

    .skill {
      background: #1e293b;
      padding: 1.25rem;
      border-radius: 16px;
      text-align: center;
      font-weight: 500;
      color: #94a3b8;
      border: 1px solid transparent;
      transition: all 0.25s ease;
    }

    .skill:hover {
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.3);
      transform: scale(1.05);
    }

    /* Projects Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .project {
      background: #0f172a;
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s ease;
    }

    .project:hover {
      transform: translateY(-6px);
      border-color: rgba(56, 189, 248, 0.4);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    .project h3 {
      font-size: 1.4rem;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }

    .project p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    /* Universal Buttons */
    .btn {
      align-self: flex-start;
      padding: 0.65rem 1.5rem;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    /* Tabs System */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 1rem;
    }

    .tab-btn {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn.active {
      color: #38bdf8;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -17px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #38bdf8;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content h3 {
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }

    .tab-content p {
      color: #cbd5e1;
    }

    /* Contact Grid */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .contact-box {
      background: #0f172a;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.25s ease;
    }

    .contact-box:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .contact-box i {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 1rem;
    }

    .contact-box h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .contact-box a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95rem;
      word-break: break-all;
      transition: color 0.2s ease;
    }

    .contact-box a:hover {
      color: #38bdf8;
    }

    /* Footer */
    footer {
      background: #020617;
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    /* ==========================================
       ANIMATIONS
       ========================================== */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==========================================
       PERFECT RESPONSIVE BREAKPOINTS (Mobile & Tablet)
       ========================================== */
    @media (max-width: 968px) {
      header h1 { font-size: 3.5rem; }
      section { padding: 4rem 1.5rem; }
      .card { padding: 2rem; }
    }

    @media (max-width: 768px) {
      header h1 { font-size: 2.8rem; }
      header p { font-size: 1.15rem; }
      
      nav {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
        gap: 0.75rem;
      }
      
      nav a {
        text-align: center;
        padding: 0.85rem;
      }

      .tabs {
        flex-direction: row;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .tab-btn {
        padding: 0.5rem;
        font-size: 0.9rem;
        flex: 1;
        text-align: center;
      }
      
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 2.2rem; }
      h2 { font-size: 1.75rem; }
      section { padding: 3.5rem 1rem; }
      .card { padding: 1.5rem; border-radius: 16px; }
    }
  </style>
</head>

<body>

  <!-- HERO HEADER -->
  <header>
    <div class="hero-content">
      <h1>Mohit Sonawane</h1>
      <p id="typing"></p>
